<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>심의 결과 대시보드 — 2026 잡매니저 이상 직무급 심의</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#F4F6F9;--bg2:#FFFFFF;--bg3:#F0F2F5;--bg4:#E8ECF0;
  --border:#DDE1E7;--border2:#C5CDD8;
  --accent:#0068B0;--accent2:#00AEAE;--accent3:#1A6B3C;
  --red:#B83232;--yellow:#7A5C00;--orange:#8A4A00;
  --text:#1A2433;--text2:#5A6A7A;--text3:#8A96A3;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Malgun Gothic','Segoe UI',sans-serif;font-size:14px;min-height:100vh}

header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 24px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.hd-logo{font-size:15px;font-weight:700;color:var(--text)}
.hd-logo span{color:var(--accent)}
.hd-badge{background:#E6F2FB;color:var(--accent);border:1px solid #99C8E8;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600}
.hd-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text2);padding:5px 12px;border-radius:6px;cursor:pointer;font-size:12px;text-decoration:none;display:inline-flex;align-items:center;gap:4px}
.hd-btn:hover{color:var(--text);border-color:var(--border2);background:var(--bg4)}

.content{padding:24px}

/* ── SUMMARY CARDS ── */
.summary-bar{display:flex;gap:10px;margin-bottom:24px;flex-wrap:wrap}
.scard{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px 18px;min-width:130px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.sv{font-size:24px;font-weight:700;margin-bottom:3px}
.sl{font-size:11px;color:var(--text2)}
.sv.blue{color:var(--accent)}.sv.green{color:var(--accent3)}.sv.red{color:var(--red)}.sv.yellow{color:#B87A00}.sv.purple{color:#5A4A9E}

/* ── MATRIX TABLE ── */
.matrix-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:10px;background:var(--bg2);margin-bottom:28px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.matrix-title{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.matrix-title h3{font-size:14px;font-weight:700;color:var(--text)}
.matrix-title span{font-size:11px;color:var(--text3)}
table.matrix{border-collapse:collapse;width:100%;min-width:max-content}
table.matrix th,table.matrix td{border:1px solid var(--border);padding:0;text-align:center;white-space:nowrap}
table.matrix thead th{background:var(--bg3);font-size:11px;color:var(--text2);font-weight:600;padding:10px 12px;position:sticky;top:0;z-index:10}
table.matrix thead th.corner{position:sticky;left:0;z-index:20;background:var(--bg3)}
table.matrix tbody th{background:var(--bg3);font-size:12px;font-weight:600;color:var(--text);padding:10px 14px;text-align:left;position:sticky;left:0;z-index:5;min-width:130px;border-right:2px solid var(--border2)}
table.matrix tbody td{min-width:88px;padding:0}
table.matrix tbody td .cell-inner{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 6px;gap:3px;min-height:52px;cursor:default}
table.matrix tbody td.pass-cell{background:#EEF4FB}
table.matrix tbody td.fail-cell{background:#FDF0F0}
table.matrix tbody td.none-cell{background:transparent}
.chip-pass{font-size:11px;font-weight:700;color:#0068B0}
.chip-fail{font-size:11px;font-weight:700;color:var(--red)}
.chip-none{font-size:11px;color:var(--text3)}
.score-tag{font-size:10px;color:var(--text3)}

/* ── DETAIL SECTION ── */
.detail-title{font-size:14px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px;color:var(--text)}
.detail-grid{display:flex;flex-direction:column;gap:20px;margin-bottom:32px}
.detail-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.detail-card-hd{padding:10px 16px;background:var(--bg3);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.dc-no{font-size:11px;color:var(--text3);font-weight:600}
.dc-name{font-size:15px;font-weight:700;color:var(--text)}
.dc-dept{font-size:11px;color:var(--text2)}
.dc-grade{font-size:11px;background:#E6F2FB;border:1px solid #99C8E8;padding:2px 8px;border-radius:4px;color:var(--accent);margin-left:auto}
.detail-card-body{padding:0}

/* 심의위원별 평가 행 */
.cm-eval-row{border-bottom:1px solid var(--border);padding:12px 16px}
.cm-eval-row:last-child{border-bottom:none}
.cm-eval-hd{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.cm-eval-name{font-size:13px;font-weight:700;color:var(--text)}
.cm-result-chip{font-size:12px;font-weight:700;padding:2px 10px;border-radius:5px}
.crp-pass{background:#E6F2FB;color:#0068B0;border:1px solid #99C8E8}
.crp-fail{background:#FBEAEA;color:#B83232;border:1px solid #E8B8B8}
.cm-eval-ts{font-size:10px;color:var(--text3);margin-left:auto}
.cm-comp-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:8px}
.cm-comp-cell{background:var(--bg3);border-radius:5px;padding:5px 6px;text-align:center;border:1px solid var(--border)}
.cm-comp-cell .ccl{font-size:10px;color:var(--text3);margin-bottom:2px}
.cm-comp-cell .ccv{font-size:13px;font-weight:700;color:var(--text)}
.cm-comment{font-size:12px;color:var(--text2);line-height:1.65;white-space:pre-wrap;background:var(--bg3);border-radius:6px;padding:8px 10px;border:1px solid var(--border)}

/* 평균 요약 */
.avg-section{padding:12px 16px;background:#F7F9FC;border-top:1px solid var(--border)}
.avg-section-lbl{font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px}
.comp-avg-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.comp-label{font-size:11px;color:var(--text2);width:90px;flex-shrink:0}
.comp-bar{flex:1;height:6px;border-radius:3px;background:var(--bg4)}
.comp-bar-fill{height:100%;border-radius:3px}
.comp-val{font-size:11px;font-weight:700;width:28px;text-align:right;color:var(--text)}
.comp-section-lbl{font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin:10px 0 6px}
.chart-container{width:100%;height:180px;position:relative;margin-bottom:8px}

/* ── LOADING ── */
.loading{text-align:center;padding:60px;color:var(--text2)}
.loading-spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── AUTH GATE ── */
#auth-gate{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center}
.auth-box{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:40px 48px;width:420px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.08)}
.auth-title{font-size:18px;font-weight:700;margin-bottom:6px;color:var(--text)}
.auth-sub{font-size:12px;color:var(--text2);margin-bottom:24px}
.auth-tag{display:inline-block;background:#FBEAEA;color:#B83232;border:1px solid #E8B8B8;font-size:11px;padding:3px 10px;border-radius:20px;margin-bottom:16px;font-weight:600}
</style>
</head>
<body>

<!-- AUTH GATE -->
<div id="auth-gate">
  <div class="auth-box">
    <div class="auth-tag">🔑 관리자 전용</div>
    <div class="auth-title">결과 대시보드</div>
    <div class="auth-sub">관리자 비밀번호를 입력해 주세요</div>
    <input id="auth-input" type="password" placeholder="관리자 비밀번호"
      style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:14px;outline:none;margin-bottom:8px"
      onkeydown="if(event.key==='Enter')doAuth()">
    <div id="auth-err" style="font-size:11px;color:var(--red);min-height:16px;margin-bottom:10px"></div>
    <button onclick="doAuth()"
      style="width:100%;background:var(--accent);color:#fff;border:none;border-radius:8px;padding:12px;font-size:15px;font-weight:700;cursor:pointer">
      입장하기
    </button>
  </div>
</div>

<header id="main-header" style="display:none">
  <div style="display:flex;align-items:center;gap:10px">
    <div class="hd-logo">직무급 <span>심의</span></div>
    <span class="hd-badge">결과 대시보드</span>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <span id="last-updated" style="font-size:11px;color:var(--text3)"></span>
    <button class="hd-btn" onclick="loadAll()">🔄 새로고침</button>
    <a href="index.html" class="hd-btn">← 심의 시스템</a>
  </div>
</header>

<div class="content" id="main-content" style="display:none">
  <div id="summary-bar" class="summary-bar">
    <div class="loading"><div class="loading-spinner"></div></div>
  </div>

  <!-- 진단 패널 -->
  <div id="diag-panel" style="background:#1a1200;border:1px solid #d29922;border-radius:8px;padding:12px 16px;margin-bottom:16px;font-size:11px;font-family:monospace;display:none">
    <div style="color:#d29922;font-weight:700;margin-bottom:8px">🔍 진단 정보 (문제 확인용)</div>
    <div id="diag-content"></div>
    <button onclick="document.getElementById('diag-panel').style.display='none'" style="margin-top:8px;background:transparent;border:1px solid #d29922;color:#d29922;border-radius:4px;padding:2px 8px;cursor:pointer;font-size:10px">닫기</button>
  </div>

  <!-- MATRIX -->
  <div class="matrix-wrap">
    <div class="matrix-title">
      <h3>📊 심의 결과 매트릭스</h3>
      <span id="matrix-sub">Google Sheets 실시간 연동</span>
    </div>
    <div id="matrix-container">
      <div class="loading"><div class="loading-spinner"></div><div>불러오는 중...</div></div>
    </div>
  </div>

  <!-- DETAIL PER CANDIDATE -->
  <div class="detail-title">
    🔍 후보자별 역량 세부 결과
    <span style="font-size:12px;color:var(--text2);font-weight:400">(공통역량 점수 + 평가의견)</span>
  </div>
  <div id="detail-grid" class="detail-grid"></div>
</div>

<script>
const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbzRG1lvhtNxC9gzj7ZwOvr7DDMjXqQ_uWo2jKzyYu9hZ781ZiTfhMkq_tmjZz70IVSLNQ/exec';
const DEFAULT_CM = ['이봉호 본부장','박우진 본부장','전기민 실장','정유정 사업부장','박지강 소장','임승욱 실장'];
const COMP = [
  {key:'학습',    label:'① 학습'},
  {key:'소통',    label:'② 소통'},
  {key:'협력',    label:'③ 협력'},
  {key:'실행',    label:'④ 실행'},
  {key:'전문성',  label:'⑤ 전문성'},
  {key:'문제해결',label:'⑥ 문제해결'},
  {key:'마인드셋',label:'⑦ Mind Set'},
  {key:'전파코칭',label:'⑧ 전파/코칭'},
];
const SCORE_COLORS = {5:'#0068B0',4:'#0068B0',3:'#0068B0',2:'#5A6A7A',1:'#B83232'};
const C = [
  {no:1,  id:'2600867',    name:'이성',   dept:'플랫폼코어팀',    cur:'잡매니저-어쏘',  tar:'잡매니저 멘토'},
  {no:2,  id:'2600871',    name:'이보미', dept:'플랫폼서비스팀',   cur:'잡매니저-어쏘',  tar:'잡매니저 멘토'},
  {no:3,  id:'2600868',    name:'고동욱', dept:'플랫폼코어팀',    cur:'잡매니저-어쏘',  tar:'잡매니저 멘토'},
  {no:4,  id:'2600860',    name:'하요나', dept:'플랫폼BM팀',      cur:'잡매니저-어쏘',  tar:'잡매니저 멘토'},
  {no:5,  id:'EZ22070459', name:'이주언', dept:'인도네시아법인',   cur:'잡매니저 멘토',  tar:'잡매니저 S2'},
  {no:6,  id:'EZ22041930', name:'안진영', dept:'인도네시아법인',   cur:'잡매니저 멘토',  tar:'잡매니저 S2'},
  {no:7,  id:'EZ23102380', name:'조설경', dept:'인도네시아법인',   cur:'잡매니저 멘토',  tar:'잡매니저 S2'},
  {no:8,  id:'EZ22092681', name:'이재우', dept:'부산경남물류팀',   cur:'잡매니저 멘토',  tar:'잡매니저 S2'},
  {no:9,  id:'EZ19111129', name:'고준섭', dept:'부산경남물류팀',   cur:'잡매니저 멘토',  tar:'잡매니저 S2'},
  {no:10, id:'2500316',    name:'김건우', dept:'수도권병원물류팀', cur:'잡매니저 멘토',  tar:'잡매니저 S2'},
  {no:11, id:'EZ24090932', name:'장의신', dept:'기업구매팀',       cur:'팀/소장(R)',     tar:'팀장 멘토'},
];

let allReviews = {};
let radarCharts = {};

async function loadAll() {
  document.getElementById('matrix-container').innerHTML =
    '<div class="loading"><div class="loading-spinner"></div><div>Google Sheets에서 불러오는 중...</div></div>';
  document.getElementById('detail-grid').innerHTML = '';
  allReviews = {};

  const results = await Promise.all(
    DEFAULT_CM.map(name =>
      fetch(SHEETS_URL + '?user=' + encodeURIComponent(name) + '&t=' + Date.now())
        .then(r => r.json()).catch(() => ({status:'err', data:[]}))
    )
  );

  let anyOk = false;
  const diagLines = [];

  results.forEach((json, i) => {
    const name = DEFAULT_CM[i];
    if(json.status !== 'ok') {
      diagLines.push(`<span style="color:#B83232">✗ ${name}: 오류 (status=${json.status||'network err'})</span>`);
      return;
    }
    anyOk = true;
    const validRows = json.data.filter(r => r.결과 !== '__UNLOCK__');
    diagLines.push(`<span style="color:#1A6B3C">✓ ${name}: ${validRows.length}건 수신</span>` +
      (validRows.length ? ' → ' + validRows.map(r=>`[${r.이름||r.사번} ${r.결과}]`).join(' ') : ''));
    validRows.forEach(row => {
      const key = `${row.심의위원}:${row.사번}`;
      if(!allReviews[key] || new Date(row.timestamp) >= new Date(allReviews[key]?.timestamp||0)) {
        const sc = {};
        COMP.forEach(c => { const v = parseInt(row['역량_'+c.key]); if(v >= 1) sc[c.key] = v; });
        allReviews[key] = {
          scores: sc, result: row.결과, comment: row.평가의견,
          timestamp: row.timestamp, reviewer: row.심의위원
        };
      }
    });
  });

  // 진단 패널 표시
  document.getElementById('diag-content').innerHTML = diagLines.join('<br>');
  document.getElementById('diag-panel').style.display = 'block';

  if(!anyOk) {
    document.getElementById('matrix-container').innerHTML =
      '<div style="padding:24px;color:var(--red);font-size:13px">⚠️ Google Sheets 연결 실패 — Apps Script 배포 상태를 확인하세요.</div>';
    document.getElementById('summary-bar').innerHTML =
      '<div style="color:var(--red);font-size:12px;padding:8px">데이터 로드 실패</div>';
    return;
  }

  const tsVal = '업데이트 ' + new Date().toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
  document.getElementById('last-updated').innerHTML =
    `<span id="ts-text" data-val="${tsVal}">${tsVal}</span> <span style="color:var(--border2)">· ${nextRefreshIn}초 후 자동갱신</span>`;

  renderSummary();
  renderMatrix();
  renderDetail();
}

function getR(cmName, cid) { return allReviews[`${cmName}:${cid}`]; }

function avg(reviews, key) {
  const vals = reviews.map(r => r.scores?.[key]).filter(v => v >= 1);
  return vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : null;
}

function barColor(v) {
  if(!v) return '#C5CDD8';
  if(v >= 2) return '#0068B0';
  return '#B83232';
}

// ── SUMMARY ──────────────────────────────────────────────
function renderSummary() {
  const totalSubmit = Object.keys(allReviews).length;
  const passTotal = Object.values(allReviews).filter(r => r.result==='합격').length;
  const failTotal = Object.values(allReviews).filter(r => r.result==='불합격').length;
  const completedCands = C.filter(c => DEFAULT_CM.some(cm => getR(cm, c.id))).length;

  document.getElementById('summary-bar').innerHTML = `
    <div class="scard"><div class="sv blue">${C.length}</div><div class="sl">전체 후보자</div></div>
    <div class="scard"><div class="sv purple">${completedCands}</div><div class="sl">평가 진행 중</div></div>
    <div class="scard"><div class="sv">${totalSubmit}</div><div class="sl">총 제출 평가</div></div>
    <div class="scard"><div class="sv green">${passTotal}</div><div class="sl">합격 평가</div></div>
    <div class="scard"><div class="sv red">${failTotal}</div><div class="sl">불합격 평가</div></div>`;
}

// ── MATRIX ───────────────────────────────────────────────
function renderMatrix() {
  // header: corner + 피평가자 names
  const candHeaders = C.map(c =>
    `<th><div style="font-size:12px;font-weight:700">${c.name}</div><div style="font-size:10px;color:var(--text3);margin-top:2px">${c.cur}→${c.tar}</div></th>`
  ).join('');

  // rows: 심의위원 × 피평가자
  const rows = DEFAULT_CM.map(cm => {
    const cells = C.map(c => {
      const r = getR(cm, c.id);
      if(!r) return '<td class="none-cell"><div class="cell-inner"><span class="chip-none">—</span></div></td>';
      const avgComp = COMP.map(cp => r.scores?.[cp.key]).filter(v=>v>=1);
      const avgVal = avgComp.length ? (avgComp.reduce((a,b)=>a+b,0)/avgComp.length).toFixed(1) : null;
      if(r.result === '합격') return `
        <td class="pass-cell"><div class="cell-inner">
          <span class="chip-pass">✓ 합격</span>
          ${avgVal ? `<span class="score-tag">역량 ${avgVal}점</span>` : ''}
        </div></td>`;
      return `
        <td class="fail-cell"><div class="cell-inner">
          <span class="chip-fail">✗ 불합격</span>
          ${avgVal ? `<span class="score-tag">역량 ${avgVal}점</span>` : ''}
        </div></td>`;
    }).join('');

    const cmPass = C.filter(c => getR(cm, c.id)?.result==='합격').length;
    const cmFail = C.filter(c => getR(cm, c.id)?.result==='불합격').length;
    const cmNone = C.length - C.filter(c => getR(cm, c.id)).length;
    return `<tr>
      <th>
        <div>${cm}</div>
        <div style="font-size:10px;color:var(--text3);font-weight:400;margin-top:2px">합격${cmPass} / 불합격${cmFail} / 미제출${cmNone}</div>
      </th>
      ${cells}
    </tr>`;
  }).join('');

  // column footer: pass/fail count per candidate
  const footCells = C.map(c => {
    const rv = DEFAULT_CM.map(cm => getR(cm, c.id)).filter(Boolean);
    const p = rv.filter(r=>r.result==='합격').length;
    const f = rv.filter(r=>r.result==='불합격').length;
    return `<td style="padding:6px 4px;background:var(--bg3)">
      ${p>0 ? `<div style="font-size:10px;color:#0068B0;font-weight:700">합격 ${p}</div>` : ''}
      ${f>0 ? `<div style="font-size:10px;color:var(--red);font-weight:700">불합격 ${f}</div>` : ''}
      ${p===0&&f===0 ? '<div style="font-size:10px;color:var(--text3)">미제출</div>' : ''}
    </td>`;
  }).join('');

  document.getElementById('matrix-container').innerHTML = `
    <table class="matrix">
      <thead>
        <tr>
          <th class="corner" style="min-width:130px">심의위원 \\ 후보자</th>
          ${candHeaders}
        </tr>
      </thead>
      <tbody>${rows}</tbody>
      <tfoot>
        <tr>
          <th style="position:sticky;left:0;background:var(--bg3);font-size:11px;color:var(--text2);padding:6px 14px">합계</th>
          ${footCells}
        </tr>
      </tfoot>
    </table>`;
}

// ── DETAIL ───────────────────────────────────────────────
function renderDetail() {
  Object.values(radarCharts).forEach(ch => ch.destroy());
  radarCharts = {};

  const grid = document.getElementById('detail-grid');
  grid.innerHTML = '';

  const SCORE_LABELS = {5:'매우 그렇다',4:'그렇다',3:'보통이다',2:'그렇지 않다',1:'전혀 그렇지 않다'};

  C.forEach(c => {
    const rv = DEFAULT_CM.map(cm => ({cm, r:getR(cm, c.id)})).filter(x=>x.r);
    if(!rv.length) return;

    // 평균 계산
    const avgVals = COMP.map(comp => {
      const vals = rv.map(x=>x.r.scores?.[comp.key]).filter(v=>v>=1);
      return vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : 0;
    });

    // 심의위원별 평가 행
    const cmRows = rv.map(({cm, r}) => {
      const isPass = r.result === '합격';
      const ts = r.timestamp ? new Date(r.timestamp).toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}) : '';
      const compCells = COMP.map(comp => {
        const sv = r.scores?.[comp.key];
        const color = sv ? SCORE_COLORS[sv] : 'var(--text3)';
        return `<div class="cm-comp-cell">
          <div class="ccl">${comp.label.replace(/[①-⑧]\s/,'')}</div>
          <div class="ccv" style="color:${color}">${sv||'—'}</div>
        </div>`;
      }).join('');
      return `<div class="cm-eval-row">
        <div class="cm-eval-hd">
          <span class="cm-eval-name">${cm}</span>
          <span class="cm-result-chip ${isPass?'crp-pass':'crp-fail'}">${isPass?'✓ 합격':'✗ 불합격'}</span>
          <span class="cm-eval-ts">${ts}</span>
        </div>
        <div class="cm-comp-grid">${compCells}</div>
        <div class="cm-comment">${r.comment||'(평가의견 없음)'}</div>
      </div>`;
    }).join('');

    // 평균 바
    const chartId = `rc-${c.id}`;
    const avgBars = COMP.map((comp,i) => {
      const a = avgVals[i];
      return `<div class="comp-avg-row">
        <span class="comp-label">${comp.label}</span>
        <div class="comp-bar"><div class="comp-bar-fill" style="width:${a/5*100}%;background:${barColor(a)}"></div></div>
        <span class="comp-val" style="color:${barColor(a)}">${a?a.toFixed(1):'-'}</span>
      </div>`;
    }).join('');

    const div = document.createElement('div');
    div.className = 'detail-card';
    div.innerHTML = `
      <div class="detail-card-hd">
        <span class="dc-no">${c.no}</span>
        <span class="dc-name">${c.name}</span>
        <span class="dc-dept">${c.dept}</span>
        <span class="dc-grade">${c.cur} → ${c.tar}</span>
        <span style="font-size:11px;color:var(--text3);margin-left:4px">${rv.length}/${DEFAULT_CM.length}명 평가</span>
      </div>
      <div class="detail-card-body">${cmRows}</div>
      <div class="avg-section">
        <div class="avg-section-lbl">공통역량 평균 (${rv.length}명 기준)</div>
        <div style="display:grid;grid-template-columns:1fr 200px;gap:16px;align-items:start">
          <div>${avgBars}</div>
          <div class="chart-container"><canvas id="${chartId}"></canvas></div>
        </div>
      </div>`;
    grid.appendChild(div);

    const ctx = document.getElementById(chartId)?.getContext('2d');
    if(ctx) {
      radarCharts[chartId] = new Chart(ctx, {
        type:'radar',
        data:{
          labels: COMP.map(c=>c.label),
          datasets:[{
            data: avgVals,
            backgroundColor:'rgba(0,104,176,0.08)',
            borderColor:'#0068B0',
            pointBackgroundColor: avgVals.map(v=>barColor(v)),
            pointRadius:3, borderWidth:2,
          }]
        },
        options:{
          scales:{r:{min:0,max:5,ticks:{stepSize:1,color:'#8A96A3',font:{size:9}},
            grid:{color:'#DDE1E7'},angleLines:{color:'#DDE1E7'},
            pointLabels:{color:'#5A6A7A',font:{size:9}}}},
          plugins:{legend:{display:false}},
          responsive:true,maintainAspectRatio:true,
        }
      });
    }
  });

  if(!grid.children.length) {
    grid.innerHTML = '<div style="color:var(--text3);font-size:13px;padding:20px">아직 제출된 평가가 없습니다.</div>';
  }
}

// ── AUTH ─────────────────────────────────────────────────
const ADMIN_PW = '1234';
let autoRefreshTimer = null;
let countdownTimer = null;
let nextRefreshIn = 30;

function doAuth() {
  const pw = document.getElementById('auth-input').value;
  if(pw !== ADMIN_PW) {
    document.getElementById('auth-err').textContent = '비밀번호가 올바르지 않습니다.';
    document.getElementById('auth-input').focus();
    return;
  }
  document.getElementById('auth-gate').style.display = 'none';
  document.getElementById('main-header').style.display = 'flex';
  document.getElementById('main-content').style.display = 'block';
  loadAll();
  startAutoRefresh();
}

function startAutoRefresh() {
  nextRefreshIn = 30;
  updateCountdown();
  autoRefreshTimer = setInterval(() => {
    loadAll();
    nextRefreshIn = 30;
  }, 30000);
  countdownTimer = setInterval(() => {
    nextRefreshIn--;
    updateCountdown();
  }, 1000);
}

function updateCountdown() {
  const el = document.getElementById('last-updated');
  const ts = document.getElementById('ts-text');
  if(ts) el.innerHTML = `${ts.dataset.val} &nbsp;<span style="color:var(--border2)">· ${nextRefreshIn}초 후 자동갱신</span>`;
}

setTimeout(() => document.getElementById('auth-input')?.focus(), 100);
</script>
